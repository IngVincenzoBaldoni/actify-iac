name: Deploy Frontend SaaS (SSR)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-saas.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL:               ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID:  ${{ vars.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID:     ${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_AWS_REGION:            eu-central-1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Sync to S3
        run: aws s3 sync frontend/out/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Restore media assets (video + poster — stored permanently in actify-saas-documents)
        run: |
          aws s3 cp "s3://actify-saas-documents/media/0708.mov" \
            s3://${{ secrets.AWS_S3_BUCKET }}/media/actify-demo.mov \
            --content-type "video/quicktime" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp "s3://actify-saas-documents/media/actify_thumb_B2.png" \
            s3://${{ secrets.AWS_S3_BUCKET }}/media/actify-poster.png \
            --content-type "image/png" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
