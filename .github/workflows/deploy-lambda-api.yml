name: Deploy Lambda API (SaaS)

on:
  push:
    branches: [main]
    paths:
      - 'lambda-api/**'
      - '.github/workflows/deploy-lambda-api.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lambda-api/package-lock.json

      - name: Install dependencies
        working-directory: lambda-api
        run: npm ci

      - name: Build & bundle
        working-directory: lambda-api
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name actify-saas-api \
            --zip-file fileb://lambda-api/dist/function.zip \
            --region eu-central-1
